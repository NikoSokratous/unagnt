name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test Go
    runs-on: ubuntu-latest
    env:
      # Ensure OpenAI integration tests skip when no API key (CI has no key)
      OPENAI_API_KEY: ""
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -coverprofile=coverage.out ./...

    - name: Test Go SDK
      run: |
        cd sdk/go
        go mod tidy
        go test ./... -v

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        fail_ci_if_error: false

  test-python:
    name: Test Python SDK
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd sdk/python
        pip install -e ".[dev]"

    - name: Run Python tests
      run: |
        cd sdk/python
        pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.10.1
        args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build unagnt
      run: go build -o bin/unagnt ./cmd/unagnt

    - name: Build unagntd
      run: go build -o bin/unagntd ./cmd/unagntd

    - name: Test CLI commands
      run: |
        ./bin/unagnt --help
        ./bin/unagnt tool --help
        ./bin/unagnt policy --help
        ./bin/unagnt agent --help
        ./bin/unagnt webhook --help
        ./bin/unagnt workflow --help
        ./bin/unagnt plugin --help

    - name: Validate example configs
      run: |
        ./bin/unagnt agent test --config examples/cli-assistant/agent.yaml || true
        ./bin/unagnt policy apply examples/cli-assistant/policy.yaml --db /tmp/ci-policy.db
        ./bin/unagnt workflow validate examples/multi-agent-workflow/research-workflow.yaml

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: bin/
  
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run integration tests
      run: go test ./tests/integration -v -timeout 10m
      env:
        REDIS_URL: redis://localhost:6379
        QDRANT_URL: http://localhost:6333
  
  build-webui:
    name: Build Web UI
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm ci

    - name: Build Web UI
      run: |
        cd web
        npm run build

    - name: Upload Web UI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webui
        path: web/dist/
  
  operator-codegen:
    name: Operator Codegen
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install controller-gen
      run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.0

    - name: Generate operator code
      run: make generate-operator

    - name: Generate CRDs
      run: make generate-crds

    - name: Verify generated files are up to date
      run: |
        git diff --exit-code k8s/operator/api/v1/zz_generated.deepcopy.go k8s/operator/config/crd/bases/ k8s/crds/ || (echo "Operator/CRD codegen is stale. Run: make generate-crds and commit." && exit 1)

    - name: Build operator
      run: make build-operator

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: [test, lint, build, test-integration, operator-codegen]
    steps:
    - name: All release gate checks passed
      run: 'echo "Release gate: tests, lint, build, integration, operator-codegen passed."'

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: docker build -f deploy/Dockerfile -t unagnt:test .

  docker-operator:
    name: Docker Operator
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build operator image
      run: docker build -f deploy/Dockerfile.operator -t unagnt-operator:test .

  operator-e2e:
    name: Operator E2E (kind)
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1.9.0
      with:
        cluster_name: unagnt-e2e
        wait: 2m

    - name: Apply CRDs
      run: kubectl apply -f k8s/crds/

    - name: Verify CRDs installed
      run: |
        kubectl get crd agents.unagnt.io workflows.unagnt.io policies.unagnt.io

