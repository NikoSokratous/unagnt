# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: false

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
  settings:
    errcheck:
      check-blank: false

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
