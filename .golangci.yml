version: "2"

run:
  timeout: 5m
  tests: false

formatters:
  enable:
    - gofmt

# Use "fast" preset to reduce noise; add exclusions for test files
linters:
  default: fast
  settings:
    errcheck:
      check-blank: false
  exclusions:
    rules:
      - path: '_test\.go$'
        linters:
          - errcheck
          - staticcheck
