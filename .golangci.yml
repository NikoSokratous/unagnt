# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
  settings:
    errcheck:
      check-blank: false

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
