# Production profile: full stack (PostgreSQL, Redis, Qdrant, Prometheus, Jaeger)
# Run with: docker-compose -f docker-compose.yml -f docker-compose.production.yml --profile production up

version: "3.8"

services:
  unagntd:
    profiles:
      - production
    build: ..
    ports:
      - "8080:8080"
    environment:
      - AGENTD_ADDR=:8080
      - AGENTD_STORE=/data/agent.db
      - DATABASE_URL=postgres://unagnt:unagnt@postgres:5432/unagnt
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis
      - qdrant
    command: ["unagntd", "--addr", ":8080", "--store", "/data/agent.db"]

  postgres:
    profiles:
      - production
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unagnt
      POSTGRES_PASSWORD: unagnt
      POSTGRES_DB: unagnt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unagnt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    profiles:
      - production
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    profiles:
      - production
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    profiles:
      - production
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  jaeger:
    profiles:
      - production
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
