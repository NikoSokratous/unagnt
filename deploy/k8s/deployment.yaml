apiVersion: apps/v1
kind: Deployment
metadata:
  name: unagntd
  labels:
    app: unagntd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unagntd
  template:
    metadata:
      labels:
        app: unagntd
    spec:
      containers:
        - name: unagntd
          image: Unagnt/unagntd:latest
          ports:
            - containerPort: 8080
          env:
            - name: AGENTD_ADDR
              value: ":8080"
            - name: AGENTD_STORE
              value: /data/agent.db
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: unagntd
spec:
  selector:
    app: unagntd
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
