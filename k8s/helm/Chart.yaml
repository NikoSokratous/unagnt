apiVersion: v2
name: Unagnt
description: A Helm chart for Unagnt - Production-grade AI agent orchestration
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ai
  - agents
  - llm
  - orchestration
  - workflows
maintainers:
  - name: Unagnt Team
    email: team@Unagnt.io
home: https://github.com/NikoSokratous/unagnt
sources:
  - https://github.com/NikoSokratous/unagnt
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
