apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: policies.unagnt.io
spec:
  group: unagnt.io
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
    shortNames:
    - pol
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - rules
            properties:
              description:
                type: string
              version:
                type: string
              rules:
                type: array
                minItems: 1
                items:
                  type: object
                  required:
                  - id
                  - condition
                  - action
                  properties:
                    id:
                      type: string
                    description:
                      type: string
                    condition:
                      type: string
                      description: CEL expression
                    action:
                      type: string
                      enum:
                      - allow
                      - deny
                      - warn
                      - require_approval
                    severity:
                      type: string
                      enum:
                      - low
                      - medium
                      - high
                      - critical
              approvers:
                type: array
                items:
                  type: string
                description: List of users who can approve policy violations
              enabled:
                type: boolean
                default: true
          status:
            type: object
            properties:
              active:
                type: boolean
              lastApplied:
                type: string
                format: date-time
              violations:
                type: integer
              approvals:
                type: integer
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Version
      type: string
      jsonPath: .spec.version
    - name: Enabled
      type: boolean
      jsonPath: .spec.enabled
    - name: Active
      type: boolean
      jsonPath: .status.active
    - name: Violations
      type: integer
      jsonPath: .status.violations
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
