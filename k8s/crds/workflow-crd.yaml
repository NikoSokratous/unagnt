apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflows.unagnt.io
spec:
  group: unagnt.io
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    singular: workflow
    shortNames:
    - wf
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - steps
            properties:
              name:
                type: string
              description:
                type: string
              steps:
                type: array
                minItems: 1
                items:
                  type: object
                  required:
                  - name
                  - agent
                  - goal
                  properties:
                    name:
                      type: string
                    agent:
                      type: string
                    goal:
                      type: string
                    outputKey:
                      type: string
                    condition:
                      type: string
                    dependsOn:
                      type: array
                      items:
                        type: string
                    timeout:
                      type: string
                    retry:
                      type: integer
                      minimum: 0
                      maximum: 10
              schedule:
                type: string
                description: Cron schedule for periodic execution
              timeout:
                type: string
                description: Overall workflow timeout
              onFailure:
                type: string
                enum:
                - retry
                - abort
                - continue
              maxConcurrent:
                type: integer
                minimum: 1
                description: Maximum concurrent workflow executions
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                - Paused
              startTime:
                type: string
                format: date-time
              completionTime:
                type: string
                format: date-time
              currentStep:
                type: string
              completedSteps:
                type: array
                items:
                  type: string
              failedSteps:
                type: array
                items:
                  type: string
              lastScheduleTime:
                type: string
                format: date-time
              nextScheduleTime:
                type: string
                format: date-time
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Current Step
      type: string
      jsonPath: .status.currentStep
    - name: Completed
      type: integer
      jsonPath: .status.completedSteps[*]
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
