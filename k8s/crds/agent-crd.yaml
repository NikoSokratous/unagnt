apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.unagnt.io
spec:
  group: unagnt.io
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
    - ag
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - role
            - llm
            properties:
              role:
                type: string
                description: Agent role (e.g., coder, researcher)
              goal:
                type: string
                description: Agent goal or purpose
              llm:
                type: object
                required:
                - provider
                - model
                properties:
                  provider:
                    type: string
                    description: LLM provider (openai, anthropic, ollama)
                  model:
                    type: string
                    description: Model name
                  temperature:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 2
                  maxTokens:
                    type: integer
                    minimum: 1
              tools:
                type: array
                items:
                  type: string
                description: List of tool names
              memory:
                type: object
                properties:
                  enabled:
                    type: boolean
                  provider:
                    type: string
                    enum:
                    - memory
                    - qdrant
                    - weaviate
                  config:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                default: 1
              resources:
                type: object
                properties:
                  requests:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                  limits:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
              autoscaling:
                type: object
                properties:
                  enabled:
                    type: boolean
                  minReplicas:
                    type: integer
                    minimum: 1
                  maxReplicas:
                    type: integer
                    minimum: 1
                  targetCPUUtilization:
                    type: integer
                    minimum: 1
                    maximum: 100
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Running
                - Failed
                - Succeeded
              replicas:
                type: integer
              readyReplicas:
                type: integer
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
    subresources:
      status: {}
      scale:
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
    additionalPrinterColumns:
    - name: Role
      type: string
      jsonPath: .spec.role
    - name: Provider
      type: string
      jsonPath: .spec.llm.provider
    - name: Model
      type: string
      jsonPath: .spec.llm.model
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Ready
      type: integer
      jsonPath: .status.readyReplicas
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
