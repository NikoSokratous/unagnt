name: db-agent-safety
version: "1.0"
description: DB agent with policy - blocks destructive ops, restricts sensitive data

model:
  provider: openai
  name: gpt-4o-mini
  temperature: 0.2

autonomy_level: 2

tools:
  - name: sql_query
    version: "1"
  - name: echo
    version: "1"

policy: ./policy.yaml

memory:
  persistent: false
  semantic: false

max_steps: 10
timeout: 60s
