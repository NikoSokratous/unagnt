name: capabilities-demo-agent
version: "1.0"
description: Showcase agent for video demo - policy (deny, require_approval), HITL, multi-tool

model:
  provider: openai
  name: gpt-4o-mini
  temperature: 0.2

autonomy_level: 2

tools:
  - name: echo
    version: "1"
  - name: calc
    version: "1"
  - name: http_request
    version: "1"

policy: ./policy.yaml

memory:
  persistent: false
  semantic: false

max_steps: 10
timeout: 5m   # allows time for human approval via webhook
